<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tap Challenge</title>
<style>
body{
    margin:0;
    background: linear-gradient(120deg, #0f0c29, #302b63, #24243e);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
    color:white;
    overflow:hidden;
    transition: background 0.5s;
}

#gameArea{
    position:relative;
    width:100vw;
    height:100vh;
}

#ball{
    width:100px;
    height:100px;
    background:red;
    border-radius:50%;
    position:absolute;
    cursor:pointer;
    transition: 0.1s, box-shadow 0.1s;
    box-shadow: 0 0 20px red, 0 0 40px orange, 0 0 60px yellow;
}

#info{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    text-shadow: 1px 1px 5px black;
}

#message{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    font-size:26px;
    font-weight:bold;
    color:#fffa;
    animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn{
    0% { opacity:0; transform: translateY(20px);}
    100% { opacity:1; transform: translateY(0);}
}

button{
    position:absolute;
    top:60px;
    left:50%;
    transform:translateX(-50%);
    padding:10px 25px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:12px;
    background: linear-gradient(45deg,#ff4e50,#f9d423);
    color:white;
    font-weight:bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
}

button:hover{
    transform: translateX(-50%) scale(1.1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}
</style>
</head>
<body>
<div id="gameArea">
    <div id="info">
        ⏳ Time: <span id="timer">5</span> |
        👆 Taps: <span id="count">0</span> |
        🚩 Level: <span id="level">1</span>
    </div>

    <button onclick="startGame()">Start</button>

    <div id="ball"></div>
    <div id="message"></div>
</div>

<script>
let taps = 0;
let timeLeft = 5;
let timer;
let gameActive = false;
let level = 1;
let requiredTaps = 10;
let ballSize = 100;

let roastMessages = [
"maderchod bsdk 😤",
"tu jake gand mara tera bss ka nhi hain🤡",
"bss ghar pe hilate rehta hain 🤣",
"behan ka lauda 🤡😤",
"degi kya khopiche me 🤤",
"Maka ladle meow ghop ghop🖕🤣",
"Fuck uhh at 90°",
"Abjeet tod seal bahut ho gya iska 👄💋",
"Hamne bahut sare aise log dekhe hain 🤡🖕",
"Ek rapta mara na sara nikal muth nikal jayega🤣🖕",
"Bagwan se daro mader chodo ",
"ye jo subha sunha bhang bhosda jesa muh laker chle aa jate ho bagwan se daro bsdk walo",
"Dafa ho jaa bada manhus lag rahe ho 🤡",
"bsdk chal nikal jaa",
"Teri jaat ka paida maro😤🤜",
"tera gnd maro 180° pe",
"dogla bsdk wala",
"harmi nasal ke.",
"Mother fuker",
"bhosda wala tera chut Maro 🤡🖕",
"ab jake ke phir try kr aa suar jaisa muh laker bsdk wlaa🤡🖕"
];

let ball = document.getElementById("ball");

function randomPosition(){
    let maxX = window.innerWidth - ballSize;
    let maxY = window.innerHeight - ballSize;
    let randomX = Math.random() * maxX;
    let randomY = Math.random() * maxY;

    ball.style.left = randomX + "px";
    ball.style.top = randomY + "px";
}

ball.addEventListener("click", function(){
    if(!gameActive) return;
    taps++;
    document.getElementById("count").innerText = taps;
    randomPosition();

    // Level up check
    if(taps >= requiredTaps){
        level++;
        taps = 0;
        requiredTaps += 5;
        ballSize -= 10;
        if(ballSize < 30){
            ballSize = 30;
        }
        ball.style.width = ballSize + "px";
        ball.style.height = ballSize + "px";

        document.getElementById("level").innerText = level;
        document.getElementById("count").innerText = 0;
    }
});

function startGame(){
    taps = 0;
    timeLeft = 5;
    gameActive = true;
    level = 1;
    requiredTaps = 10;
    ballSize = 100;

    ball.style.width = ballSize + "px";
    ball.style.height = ballSize + "px";

    document.getElementById("count").innerText = 0;
    document.getElementById("timer").innerText = 5;
    document.getElementById("message").innerText = "";
    document.getElementById("level").innerText = level;

    randomPosition();

    clearInterval(timer);

    timer = setInterval(function(){
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;

        if(timeLeft <= 0){
            clearInterval(timer);
            gameActive = false;

            if(level > 1){
                document.getElementById("message").innerText = "🔥 Nice Speed! You Win 😎";
            } else {
                let roast = roastMessages[Math.floor(Math.random()*roastMessages.length)];
                document.getElementById("message").innerText = roast;
            }
        }
    },1000);
}
</script>

</body>
</html>

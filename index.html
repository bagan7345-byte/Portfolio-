<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bomb Blast Falling Edition 💣</title>
    <style>
        :root {
            --primary: #00f2ff;
            --danger: #ff4d4d;
            --bg: #0a0a0c;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            user-select: none;
            touch-action: manipulation;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 2px solid var(--primary);
            z-index: 100;
        }

        .title {
            font-size: 24px;
            margin: 0;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
        }

        .controls {
            margin-top: 5px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        input, select, button {
            padding: 8px 12px;
            border-radius: 5px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        input { background: #222; color: white; border: 1px solid #444; width: 80px; }
        
        button {
            cursor: pointer;
            font-weight: bold;
            background: var(--primary);
            color: black;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.9); }

        #stopBtn { background: var(--danger); color: white; }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 8px;
            background: #111;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }

        .highlight { color: var(--primary); }

        #gameArea {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            cursor: crosshair;
            overflow: hidden;
        }

        .bomb {
            position: absolute;
            font-size: 50px; /* Thoda bada size */
            cursor: pointer;
            user-select: none;
            filter: drop-shadow(0 0 10px rgba(255,0,0,0.5));
            will-change: transform;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            touch-action: none;
        }

        #warning {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            color: var(--danger);
            font-size: 28px;
            font-weight: bold;
            display: none;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px black;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(-8px, 8px); }
            50% { transform: translate(8px, -8px); }
            75% { transform: translate(-8px, -8px); }
        }

        .shake-effect {
            animation: shake 0.3s ease-in-out;
        }

        .blast-text {
            position: absolute;
            color: #ffcc00;
            font-weight: bold;
            pointer-events: none;
            font-size: 22px;
            z-index: 50;
            animation: fadeUp 0.6s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-60px) scale(1.5); }
        }

        .leaderboard-section {
            background: #000;
            padding: 8px;
            font-size: 14px;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="title">BOMB FALL 💣</h1>
        <div class="controls">
            <input type="text" id="playerName" placeholder="Name" maxlength="10">
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
            <button id="startBtn">START</button>
            <button id="stopBtn">STOP</button>
        </div>
    </div>

    <div class="stats-bar">
        <div>SCORE: <span id="score" class="highlight">0</span></div>
        <div>TIME: <span id="timer" class="highlight">0</span>s</div>
        <div>MISSES: <span id="misses" style="color: red;">0</span>/10</div>
    </div>

    <div id="gameArea">
        <div id="warning">⚠️ RUNNING OUT OF TIME! ⚠️</div>
    </div>

    <div class="leaderboard-section">
        <div id="leaderboard">High Score: <span id="highScore" class="highlight">0</span></div>
    </div>
</div>

<script>
    let score = 0;
    let misses = 0;
    let timeLeft = 0;
    let gameActive = false;
    let spawnTimer = null;
    let countdownTimer = null;
    let gameLoop = null;
    let bombs = [];
    
    const configs = {
        easy: { time: 60, spawnRate: 1300, fallSpeed: 2.5 },
        medium: { time: 45, spawnRate: 900, fallSpeed: 4.5 },
        hard: { time: 30, spawnRate: 600, fallSpeed: 7 }
    };

    const gameArea = document.getElementById('gameArea');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const missesEl = document.getElementById('misses');
    const highScoreEl = document.getElementById('highScore');
    const warningEl = document.getElementById('warning');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');

    highScoreEl.innerText = localStorage.getItem('bombFallBest') || 0;

    function startGame() {
        if (gameActive) return;
        
        const diff = document.getElementById('difficulty').value;
        const config = configs[diff];

        score = 0;
        misses = 0;
        timeLeft = config.time;
        gameActive = true;
        bombs = [];
        
        scoreEl.innerText = score;
        timerEl.innerText = timeLeft;
        missesEl.innerText = misses;
        
        startBtn.disabled = true;
        
        gameLoop = requestAnimationFrame(updateGame);
        spawnTimer = setInterval(() => spawnBomb(config.fallSpeed), config.spawnRate);
        
        countdownTimer = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 5 && timeLeft > 0) warningEl.style.display = 'block';
            if (timeLeft <= 0) endGame("TIME'S UP!");
        }, 1000);
    }

    function handleBombBlast(e, bombObj) {
        if (!gameActive) return;
        e.preventDefault();
        e.stopPropagation();

        score += 10;
        scoreEl.innerText = score;

        // Get coordinates for effect
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        createBlastEffect(clientX, clientY);
        bombObj.el.remove();
        bombs = bombs.filter(b => b !== bombObj);
    }

    function spawnBomb(speed) {
        if (!gameActive) return;

        const bomb = document.createElement('div');
        bomb.className = 'bomb';
        bomb.innerText = '💣';
        
        const x = Math.random() * (gameArea.clientWidth - 70);
        const y = -70; 
        
        bomb.style.left = `${x}px`;
        bomb.style.top = `${y}px`;

        const bombObj = {
            el: bomb,
            y: y,
            speed: speed + (Math.random() * 2)
        };

        // Multi-touch and Mouse support
        bomb.addEventListener('touchstart', (e) => handleBombBlast(e, bombObj), {passive: false});
        bomb.addEventListener('mousedown', (e) => handleBombBlast(e, bombObj));

        gameArea.appendChild(bomb);
        bombs.push(bombObj);
    }

    function updateGame() {
        if (!gameActive) return;

        for (let i = bombs.length - 1; i >= 0; i--) {
            let b = bombs[i];
            b.y += b.speed;
            b.el.style.transform = `translateY(${b.y}px)`; // Faster than top

            if (b.y > gameArea.clientHeight) {
                b.el.remove();
                bombs.splice(i, 1);
                misses++;
                missesEl.innerText = misses;
                
                gameArea.classList.add('shake-effect');
                setTimeout(() => gameArea.classList.remove('shake-effect'), 200);

                if (misses >= 10) {
                    endGame("TOO MANY MISSES (10/10)!");
                }
            }
        }

        gameLoop = requestAnimationFrame(updateGame);
    }

    function createBlastEffect(x, y) {
        const text = document.createElement('div');
        text.className = 'blast-text';
        text.innerText = '💥 BOOM!';
        text.style.left = `${x - 40}px`;
        text.style.top = `${y - 40}px`;
        document.body.appendChild(text);
        setTimeout(() => text.remove(), 600);
    }

    function endGame(reason) {
        gameActive = false;
        clearInterval(spawnTimer);
        clearInterval(countdownTimer);
        cancelAnimationFrame(gameLoop);
        
        warningEl.style.display = 'none';
        
        const best = localStorage.getItem('bombFallBest') || 0;
        if (score > best) {
            localStorage.setItem('bombFallBest', score);
            highScoreEl.innerText = score;
        }

        setTimeout(() => {
            alert(`${reason}\nFinal Score: ${score}`);
            bombs.forEach(b => b.el.remove());
            bombs = [];
            startBtn.disabled = false;
        }, 100);
    }

    startBtn.onclick = startGame;
    stopBtn.onclick = () => endGame("GAME STOPPED");

</script>
</body>
</html>

DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-size: 22px;
    font-family: Arial, sans-serif;
}

#container {
    position: absolute;
    top: -100%;
    width: 100%;
    text-align: center;
    color: #ff4d6d;
    animation: scrollDown 10s linear infinite;
    text-shadow: 
        0 0 5px #ff4d6d,
        0 0 10px #ff4d6d,
        0 0 20px #ff1a40,
        0 0 40px #ff1a40;
}

@keyframes scrollDown {
    from { top: -100%; }
    to { top: 100%; }
}
</style>
</head>

<body>

<div id="container"></div>

<script>
let container = document.getElementById("container");

for (let i = 0; i < 3000; i++) {
    container.innerHTML += "Sorry 🥺<br>";
}
</script>

</body>
</html>
